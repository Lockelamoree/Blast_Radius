name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest
      - name: Audit submission bundle
        run: python scripts/submission_preflight.py
      - name: Verify the curated scenario bank
        run: python .agents/skills/verify-scenario/scripts/verify_scenarios.py
      - name: Check shell script syntax
        run: bash -n deploy/deploy.sh scripts/action_verify.sh
      - name: Build wheel
        run: python -m build --wheel
      - name: Verify packaged runtime resources
        run: >-
          python -c "import glob, zipfile;
          wheel=glob.glob('dist/*.whl')[0];
          names=set(zipfile.ZipFile(wheel).namelist());
          required={'blast_radius/data/scenarios.json','blast_radius/data/templates.json',
          'blast_radius/data/questions.json','blast_radius/data/detection_corpus.jsonl',
          'blast_radius/data/detection_eval_baseline.json','blast_radius/static/app.js',
          'blast_radius/static/styles.css','blast_radius/static/improvements.css',
          'blast_radius/static/integrity-check.js','blast_radius/templates/index.html'};
          missing=sorted(required-names);
          assert not missing, f'missing packaged resources: {missing}'"
      - name: Smoke-test the installed wheel outside the checkout
        run: |
          WHEEL="$(realpath dist/*.whl)"
          python -m venv "$RUNNER_TEMP/wheel-smoke"
          "$RUNNER_TEMP/wheel-smoke/bin/python" -m pip install "$WHEEL"
          cd "$RUNNER_TEMP"
          BLAST_RADIUS_DATABASE="$RUNNER_TEMP/wheel-smoke.db" \
            "$RUNNER_TEMP/wheel-smoke/bin/python" -c \
            "from blast_radius.main import app; assert app.title == 'Blast Radius'"
          "$RUNNER_TEMP/wheel-smoke/bin/blastradius" verify --bank
          printf 'pytest -q' | "$RUNNER_TEMP/wheel-smoke/bin/blastradius" check --kind command - --fail-on never
          "$RUNNER_TEMP/wheel-smoke/bin/blastradius" eval-detection --json > /dev/null
          "$RUNNER_TEMP/wheel-smoke/bin/blastradius" eval-detection --check-baseline
          "$RUNNER_TEMP/wheel-smoke/bin/blastradius" fuzz-inspector --seed 7 --iterations 20 --json > /dev/null

  action-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Exercise the checked-out composite Action
        id: blast-radius
        uses: ./
        with:
          diff-base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD^' }}
          fail-on: never
      - name: Assert Action outputs
        shell: bash
        env:
          VERDICT: ${{ steps.blast-radius.outputs.verdict }}
          CRITICAL: ${{ steps.blast-radius.outputs.critical }}
          CAUTION: ${{ steps.blast-radius.outputs.caution }}
        run: |
          test -n "$VERDICT"
          [[ "$CRITICAL" =~ ^[0-9]+$ ]]
          [[ "$CAUTION" =~ ^[0-9]+$ ]]
      - name: Assert unmatched scenario globs fail closed
        shell: bash
        run: |
          summary="$RUNNER_TEMP/no-match-summary.md"
          if BR_SCENARIOS="definitely-missing-scenarios/*.json" \
             BR_DIFF_BASE="" BR_FAIL_ON="never" \
             GITHUB_ACTION_PATH="$GITHUB_WORKSPACE" GITHUB_STEP_SUMMARY="$summary" \
             bash scripts/action_verify.sh; then
            echo "Expected an unmatched scenario glob to fail"
            exit 1
          fi
          grep -F "No files matched" "$summary"
      - name: Assert unavailable diff bases fail closed
        shell: bash
        run: |
          summary="$RUNNER_TEMP/missing-base-summary.md"
          if BR_SCENARIOS="" BR_DIFF_BASE="refs/heads/definitely-missing" \
             BR_FAIL_ON="never" GITHUB_ACTION_PATH="$GITHUB_WORKSPACE" \
             GITHUB_STEP_SUMMARY="$summary" bash scripts/action_verify.sh; then
            echo "Expected an unavailable diff base to fail"
            exit 1
          fi
          grep -F "fetch-depth: 0" "$summary"
